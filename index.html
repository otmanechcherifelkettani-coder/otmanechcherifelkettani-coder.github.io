<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Good morning, Otman</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d0f;
      --surface: #141416;
      --surface2: #1a1a1e;
      --border:  rgba(255,255,255,0.07);
      --accent:  #7c6af7;
      --accent2: #c084fc;
      --green:   #4ade80;
      --text:    #e8e8f0;
      --muted:   #6b6b80;
      --glow:    rgba(124,106,247,0.25);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Glow orb ── */
    body::after {
      content: '';
      position: fixed;
      top: -20vh;
      left: 50%;
      transform: translateX(-50%);
      width: 80vw;
      height: 80vw;
      max-width: 900px;
      max-height: 900px;
      background: radial-gradient(circle, rgba(124,106,247,0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 880px;
      margin: 0 auto;
      padding: 40px 24px 60px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 32px;
      position: relative;
      overflow: hidden;
    }

    .card-label {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 14px;
    }

    /* ── Top row: clock + weather ── */
    .top-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 600px) { .top-row { grid-template-columns: 1fr; } }

    /* ── Clock card ── */
    .clock-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    }

    #clock-time {
      font-size: clamp(2.8rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    #clock-date {
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 400;
    }

    /* ── Weather card ── */
    .weather-card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .weather-main {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
    }

    #weather-icon {
      font-size: 2.8rem;
      line-height: 1;
    }

    #weather-temp {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    #weather-desc {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 10px;
      text-transform: capitalize;
    }

    .weather-meta {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .weather-meta span {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .weather-meta span b {
      color: var(--text);
    }

    #weather-loading, #weather-error {
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── Quote card ── */
    .quote-card::before {
      content: '"';
      position: absolute;
      top: 12px;
      right: 24px;
      font-size: 7rem;
      line-height: 1;
      font-weight: 900;
      color: rgba(124,106,247,0.07);
      font-family: Georgia, serif;
      pointer-events: none;
    }

    #quote-text {
      font-size: 1.1rem;
      line-height: 1.7;
      color: var(--text);
      font-style: italic;
      margin-bottom: 12px;
      max-width: 700px;
    }

    #quote-author {
      font-size: 0.82rem;
      color: var(--accent2);
      font-weight: 600;
      font-style: normal;
    }

    /* ── Todo card ── */
    .todo-input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    #todo-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    #todo-input::placeholder { color: var(--muted); }
    #todo-input:focus { border-color: rgba(124,106,247,0.5); }

    #todo-add {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 0 20px var(--glow);
    }

    #todo-add:hover { opacity: 0.9; transform: translateY(-1px); }

    #todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: border-color 0.2s, opacity 0.2s;
      animation: slide-in 0.25s ease;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item.done {
      opacity: 0.45;
      border-color: transparent;
    }

    .todo-check {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      font-size: 0.75rem;
    }

    .todo-item.done .todo-check {
      background: var(--green);
      border-color: var(--green);
      color: #0d0d0f;
    }

    .todo-text {
      flex: 1;
      font-size: 0.92rem;
      line-height: 1.4;
      transition: text-decoration 0.2s;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .todo-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .todo-delete:hover { color: #f87171; background: rgba(248,113,113,0.1); }

    .todo-empty {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .todo-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .todo-footer span { font-size: 0.8rem; color: var(--muted); }

    .todo-clear {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s;
    }

    .todo-clear:hover { color: #f87171; }

    /* ── Location badge ── */
    .location-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2.5s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.45; transform: scale(0.8); }
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.78rem;
      padding-top: 8px;
    }

    footer span { color: var(--accent2); }
  </style>
</head>
<body>

<main class="page">

  <!-- Top row: Clock + Weather -->
  <div class="top-row">

    <!-- Clock -->
    <div class="card clock-card">
      <div class="location-badge"><span class="dot"></span> Amsterdam, Netherlands</div>
      <div id="clock-time">00:00:00</div>
      <div id="clock-date">Loading…</div>
    </div>

    <!-- Weather -->
    <div class="card weather-card">
      <div class="card-label">Weather</div>
      <div id="weather-loading">Fetching Amsterdam weather…</div>
      <div id="weather-content" style="display:none">
        <div class="weather-main">
          <span id="weather-icon">🌤</span>
          <span id="weather-temp">—</span>
        </div>
        <div id="weather-desc">—</div>
        <div class="weather-meta">
          <span>Feels like <b id="weather-feels">—</b></span>
          <span>Humidity <b id="weather-humidity">—</b></span>
          <span>Wind <b id="weather-wind">—</b></span>
        </div>
      </div>
      <div id="weather-error" style="display:none">Could not load weather.</div>
    </div>

  </div>

  <!-- Motivational Quote -->
  <div class="card quote-card">
    <div class="card-label">Daily Inspiration</div>
    <p id="quote-text">Loading…</p>
    <span id="quote-author"></span>
  </div>

  <!-- To-Do List -->
  <div class="card">
    <div class="card-label">To-Do</div>
    <div class="todo-input-row">
      <input id="todo-input" type="text" placeholder="Add a task and press Enter…" maxlength="200" />
      <button id="todo-add">+ Add</button>
    </div>
    <div id="todo-list"></div>
    <div class="todo-footer">
      <span id="todo-count">0 tasks</span>
      <button class="todo-clear" id="todo-clear-done">Clear completed</button>
    </div>
  </div>

</main>

<footer>
  <p>Made with curiosity in <span>Amsterdam</span> &mdash; &copy; 2026 Otman</p>
</footer>

<script>
// ══════════════════════════════
//  CLOCK
// ══════════════════════════════
(function initClock() {
  const timeEl = document.getElementById('clock-time');
  const dateEl = document.getElementById('clock-date');

  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  function tick() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    timeEl.textContent = `${h}:${m}:${s}`;

    const day   = DAYS[now.getDay()];
    const date  = now.getDate();
    const month = MONTHS[now.getMonth()];
    const year  = now.getFullYear();
    const suffix = date === 1 ? 'st' : date === 2 ? 'nd' : date === 3 ? 'rd' : 'th';
    dateEl.textContent = `${day}, ${month} ${date}${suffix} ${year}`;
  }

  tick();
  setInterval(tick, 1000);
})();

// ══════════════════════════════
//  WEATHER  (wttr.in)
// ══════════════════════════════
(function initWeather() {
  const WMO_ICONS = {
    0:'☀️',1:'🌤',2:'⛅',3:'☁️',
    45:'🌫',48:'🌫',
    51:'🌦',53:'🌦',55:'🌧',
    61:'🌧',63:'🌧',65:'🌧',
    71:'🌨',73:'🌨',75:'❄️',
    80:'🌦',81:'🌧',82:'⛈',
    95:'⛈',96:'⛈',99:'⛈'
  };
  const WMO_DESC = {
    0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',
    45:'Foggy',48:'Icy fog',
    51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',
    61:'Light rain',63:'Rain',65:'Heavy rain',
    71:'Light snow',73:'Snow',75:'Heavy snow',
    80:'Showers',81:'Rain showers',82:'Heavy showers',
    95:'Thunderstorm',96:'Thunderstorm',99:'Heavy thunderstorm'
  };

  fetch('https://api.open-meteo.com/v1/forecast?latitude=52.3676&longitude=4.9041&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code&wind_speed_unit=kmh&temperature_unit=celsius')
    .then(r => r.json())
    .then(data => {
      const c = data.current;
      const code = c.weather_code;

      document.getElementById('weather-icon').textContent = WMO_ICONS[code] || '🌡';
      document.getElementById('weather-temp').textContent  = `${Math.round(c.temperature_2m)}°C`;
      document.getElementById('weather-desc').textContent  = WMO_DESC[code] || 'Unknown';
      document.getElementById('weather-feels').textContent    = `${Math.round(c.apparent_temperature)}°C`;
      document.getElementById('weather-humidity').textContent = `${c.relative_humidity_2m}%`;
      document.getElementById('weather-wind').textContent     = `${Math.round(c.wind_speed_10m)} km/h`;

      document.getElementById('weather-loading').style.display = 'none';
      document.getElementById('weather-content').style.display = 'block';
    })
    .catch(() => {
      document.getElementById('weather-loading').style.display = 'none';
      document.getElementById('weather-error').style.display   = 'block';
    });
})();

// ══════════════════════════════
//  DAILY QUOTE
// ══════════════════════════════
(function initQuote() {
  const quotes = [
    { text: "The secret of getting ahead is getting started.", author: "Mark Twain" },
    { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
    { text: "Our greatest glory is not in never falling, but in rising every time we fall.", author: "Confucius" },
    { text: "Well done is better than well said.", author: "Benjamin Franklin" },
    { text: "In the middle of every difficulty lies opportunity.", author: "Albert Einstein" },
    { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },
    { text: "Act as if what you do makes a difference. It does.", author: "William James" },
    { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
    { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
    { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
    { text: "You are never too old to set another goal or to dream a new dream.", author: "C.S. Lewis" },
    { text: "Start where you are. Use what you have. Do what you can.", author: "Arthur Ashe" },
    { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
    { text: "What you get by achieving your goals is not as important as what you become.", author: "Henry David Thoreau" },
    { text: "Small daily improvements over time lead to stunning results.", author: "Robin Sharma" },
    { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb" },
    { text: "You don't have to be great to start, but you have to start to be great.", author: "Zig Ziglar" },
    { text: "Energy and persistence conquer all things.", author: "Benjamin Franklin" },
    { text: "Clarity of mind means clarity of passion.", author: "Blaise Pascal" },
    { text: "Nothing in life is to be feared, only to be understood.", author: "Marie Curie" },
    { text: "Everything you've ever wanted is on the other side of fear.", author: "George Addair" },
    { text: "Push yourself, because no one else is going to do it for you.", author: "Unknown" },
    { text: "Dream it. Wish it. Do it.", author: "Unknown" },
    { text: "Great things never come from comfort zones.", author: "Unknown" },
    { text: "Little things make big days.", author: "Unknown" },
    { text: "It's going to be hard, but hard does not mean impossible.", author: "Unknown" },
    { text: "Don't wait for opportunity. Create it.", author: "Unknown" },
    { text: "Sometimes we're tested not to show our weaknesses, but to discover our strengths.", author: "Unknown" },
    { text: "Do something today that your future self will thank you for.", author: "Unknown" },
    { text: "The harder you work for something, the greater you'll feel when you achieve it.", author: "Unknown" },
    { text: "Wake up with determination. Go to bed with satisfaction.", author: "Unknown" },
    { text: "Stop waiting for Friday. Start living for today.", author: "Unknown" },
    { text: "Be so good they can't ignore you.", author: "Steve Martin" },
    { text: "Simplicity is the ultimate sophistication.", author: "Leonardo da Vinci" },
    { text: "Stay hungry, stay foolish.", author: "Steve Jobs" },
    { text: "Make each day your masterpiece.", author: "John Wooden" },
    { text: "Intelligence is the ability to adapt to change.", author: "Stephen Hawking" },
    { text: "An investment in knowledge pays the best interest.", author: "Benjamin Franklin" },
  ];

  // Pick quote based on day of year so it's stable all day but changes daily
  const now   = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const diff  = now - start;
  const oneDay = 1000 * 60 * 60 * 24;
  const dayOfYear = Math.floor(diff / oneDay);
  const q = quotes[dayOfYear % quotes.length];

  document.getElementById('quote-text').textContent   = q.text;
  document.getElementById('quote-author').textContent = `— ${q.author}`;
})();

// ══════════════════════════════
//  TO-DO LIST
// ══════════════════════════════
(function initTodo() {
  const STORAGE_KEY = 'morning-dashboard-todos';
  const listEl    = document.getElementById('todo-list');
  const input     = document.getElementById('todo-input');
  const addBtn    = document.getElementById('todo-add');
  const countEl   = document.getElementById('todo-count');
  const clearBtn  = document.getElementById('todo-clear-done');

  let todos = [];

  function load() {
    try { todos = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { todos = []; }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
  }

  function render() {
    listEl.innerHTML = '';
    if (todos.length === 0) {
      listEl.innerHTML = '<div class="todo-empty">No tasks yet — add one above 🎯</div>';
    } else {
      todos.forEach((todo, idx) => {
        const item = document.createElement('div');
        item.className = 'todo-item' + (todo.done ? ' done' : '');

        const check = document.createElement('button');
        check.className = 'todo-check';
        check.setAttribute('aria-label', todo.done ? 'Mark incomplete' : 'Mark complete');
        check.innerHTML = todo.done ? '✓' : '';
        check.addEventListener('click', () => toggle(idx));

        const text = document.createElement('span');
        text.className = 'todo-text';
        text.textContent = todo.text;

        const del = document.createElement('button');
        del.className = 'todo-delete';
        del.innerHTML = '×';
        del.setAttribute('aria-label', 'Delete task');
        del.addEventListener('click', () => remove(idx));

        item.append(check, text, del);
        listEl.appendChild(item);
      });
    }

    const total    = todos.length;
    const done     = todos.filter(t => t.done).length;
    const remaining = total - done;
    countEl.textContent = `${remaining} remaining · ${done} done`;
  }

  function add() {
    const text = input.value.trim();
    if (!text) return;
    todos.unshift({ text, done: false, id: Date.now() });
    save();
    render();
    input.value = '';
    input.focus();
  }

  function toggle(idx) {
    todos[idx].done = !todos[idx].done;
    save();
    render();
  }

  function remove(idx) {
    todos.splice(idx, 1);
    save();
    render();
  }

  addBtn.addEventListener('click', add);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') add(); });
  clearBtn.addEventListener('click', () => {
    todos = todos.filter(t => !t.done);
    save();
    render();
  });

  load();
  render();
})();
</script>

</body>
</html>
